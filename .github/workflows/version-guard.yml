name: version-guard

# Guardrail: the in-repo version must never be ahead of the latest v* git tag.

on:
  push:
    branches: [main, 'rc/**']
  pull_request:
    branches: [main, 'rc/**']

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --quiet packaging
      - name: Package version must not be ahead of the latest tag
        shell: python
        run: |
          import json
          import re
          import subprocess
          import sys
          from pathlib import Path

          from packaging.version import InvalidVersion, Version

          manifest_raw = json.loads(Path("package.json").read_text(encoding="utf-8")).get("version")
          if not manifest_raw:
              print("::error::version-guard: could not read package.json version")
              sys.exit(1)

          tags = subprocess.run(["git", "tag"], capture_output=True, text=True, check=True).stdout.split()
          candidates = []
          for tag in tags:
              if not tag.startswith("v"):
                  continue
              try:
                  candidates.append((Version(tag[1:]), tag))
              except InvalidVersion:
                  continue
          if not candidates:
              print("::notice::version-guard: no v* tags yet; nothing to compare against")
              sys.exit(0)

          latest_version, latest_tag = max(candidates, key=lambda item: item[0])
          manifest = Version(re.sub(r"^[vV]", "", manifest_raw))
          print(f"nirs4all-ui package: {manifest}    latest tag = {latest_tag} ({latest_version})")
          if manifest > latest_version:
              print(
                  f"::error::version-guard: package version {manifest} is ahead of latest tag {latest_tag}. "
                  f"Tag v{manifest} before merging the bump to main."
              )
              sys.exit(1)
          print("OK: package version is not ahead of the latest tag.")
