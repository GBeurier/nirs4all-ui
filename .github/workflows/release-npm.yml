name: release-npm

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = build only (no publish)"
        type: string
        default: "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run package gate
        run: npm run ci

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "${tag_version}" != "${package_version}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json ${package_version}" >&2
            exit 1
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')) || inputs.dry_run == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Run package gate
        run: npm run ci

      - name: Decide publish
        id: gate
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF_NAME}" == v* ]] && [[ "${GITHUB_REF_NAME}" != *-* ]]; then
            do=true
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            do=true
          else
            do=false
            echo "Dry-run only (no publish)."
          fi

          if [ "$do" = "true" ]; then
            package_name="$(node -p "require('./package.json').name")"
            package_version="$(node -p "require('./package.json').version")"
            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} already published; skipping publish."
              do=false
            fi
          fi
          echo "do=$do" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.gate.outputs.do == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
