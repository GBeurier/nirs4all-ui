name: CI

on:
  push:
    branches:
      - main
      - rc/**
  pull_request:

jobs:
  ui:
    name: nirs4all-ui
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run package gate
        run: npm run ci
